# Custom Twenty image build → homelab Docker Registry (CT 209).
# Phase-4 of the homelab self-host plan. Activate when this fork carries real
# source customizations (an unmodified fork == official image, so don't waste CI
# minutes building it).
#
# Prerequisites before enabling:
#   - Repo secrets REGISTRY_USER / REGISTRY_PASS (homelab registry creds, CT 209).
#   - registry.aisuffer.com reachable from GitHub-hosted runners (CF tunnel ingress;
#     if behind CF Access, add a service token or self-hosted runner on the LAN).
# After a successful build, point CT 214 /opt/twenty/.env image/TAG at
#   registry.aisuffer.com/twenty:<sha>, `docker login`, `docker compose pull && up -d`.

name: build-images
on:
  workflow_dispatch: {}
  # push:
  #   branches: [main]
  #   paths: ["packages/**", "Dockerfile", ".github/workflows/build-images.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: registry.aisuffer.com
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASS }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/twenty-docker/twenty/Dockerfile
          push: true
          tags: |
            registry.aisuffer.com/twenty:${{ github.sha }}
            registry.aisuffer.com/twenty:latest
